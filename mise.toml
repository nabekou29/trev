# https://mise.jdx.dev/configuration.html
[settings]
experimental = true

[tools]
rust = "nightly-2026-03-27"

[tasks.build]
description = "Build the binary"
run = "cargo build --all-features"
sources = ["Cargo.toml", "src/**/*.rs"]

[tasks.test]
description = "Run tests"
run = "cargo test --all-features"

[tasks.lint]
description = "Run lints"
run = "cargo clippy --all-targets --all-features"

[tasks.lint-fix]
description = "Run lints and fix them"
run = "cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged"

[tasks.format]
description = "Format the code"
run = "cargo fmt --all"

[tasks.format-check]
description = "Format check"
run = "cargo fmt --all -- --check"

[tasks.bench]
description = "Run all benchmarks"
run = "cargo bench"

[tasks.install-components]
description = "Install components"
run = [
  "rustup component add rust-analyzer",
  "rustup component add rustfmt",
  "rustup component add clippy",
  "rustup component add llvm-tools-preview",
]

[tasks.schema]
description = "Regenerate config JSON Schema"
run = "cargo run --features dev -- schema > config.schema.json"
sources = ["src/config.rs", "src/ui/column.rs"]
outputs = ["config.schema.json"]

[tasks.docs]
description = "Regenerate keybinding docs"
run = "cargo run --features dev -- docs > docs/keybindings.md"

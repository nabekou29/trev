# https://mise.jdx.dev/configuration.html
[settings]
experimental = true

[tools]
rust = "nightly-2026-01-24"

[tasks.build]
description = "Build the binary"
run = "cargo build --all-features"
sources = ["Cargo.toml", "src/**/*.rs"]

[tasks.test]
description = "Run tests"
run = "cargo test --all-features"

[tasks.lint]
description = "Run lints"
run = "cargo clippy --all-targets --all-features"

[tasks.lint-fix]
description = "Run lints and fix them"
run = "cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged"

[tasks.format]
description = "Format the code"
run = "cargo fmt --all"

[tasks.format-check]
description = "Format check"
run = "cargo fmt --all -- --check"

[tasks.bench]
description = "Run all benchmarks"
run = "cargo bench"

[tasks.install-components]
description = "Install components"
run = [
  "rustup component add rust-analyzer",
  "rustup component add rustfmt",
  "rustup component add clippy",
  "rustup component add llvm-tools-preview",
  "cargo install cargo-llvm-cov",
]

[tasks.coverage]
description = "Run tests with coverage"
run = "cargo llvm-cov --all-features"

[tasks.coverage-html]
description = "Run tests with coverage and generate HTML report"
run = "cargo llvm-cov --all-features --html --open"

[tasks.schema]
description = "Regenerate config JSON Schema"
run = "cargo run -- schema > config.schema.json"
sources = ["src/config.rs", "src/ui/column.rs"]
outputs = ["config.schema.json"]

[tasks.coverage-ci]
description = "Run tests with coverage for CI (JSON output)"
run = "cargo llvm-cov --all-features --codecov --output-path codecov.json"

[tasks.build-install-release]
description = "Build and install"
run = "cargo install --path . --force"
sources = ["Cargo.toml", "src/**/*.rs"]
outputs = ["{{env.CARGO_HOME}}/bin/trev"]

[tasks.release]
description = "Preview release (dry-run)"
usage = 'arg "[level]" default="patch"'
run = "cargo release ${usage_level}"

[tasks.release-execute]
description = "Execute release"
usage = 'arg "[level]" default="patch"'
run = "cargo release --execute ${usage_level}"

[tasks.changelog]
description = "Preview CHANGELOG generation"
run = "git-cliff --unreleased"
